   <!DOCTYPE html>
   <htm
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>student cards</title>
    <!-- Bootstrap CSS -->
   <link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  rel="stylesheet"
  integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
  crossorigin="anonymous">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>
<body class= "bg-light">
    <div class= "container py-5">
        <h2 class="text-center mb-4"> student Records</h2>
        <input type="text" id="search" class="form-control mb-4"
        placeholder="Seach Student">
    <div id="container" class="row g-4"></div>
    </div>
<script>
    const students = [
        { name: "mahak", branch: "DS", CGPA: 9 },
        { name: "khushi", branch: "DS", CGPA: 9 }
    ];

    let html = "";

    for (let i = 0; i < students.length; i++) {
        html += `
    <div class="col-md-4 card-item">
        <div class="card">
            <div class="card-body">
                <h4>${students[i].name}</h4>
                <button class="btn btn-primary btn-sm mt-2">
                    Show Details
                </button>
                <div class="details mt-3" style="display:none;">
                    <p><strong>branch:</strong> ${students[i].branch}</p>
                    <p><strong>CGPA:</strong> ${students[i].CGPA}</p>
                </div>
            </div>
        </div>
        </div>
    `;
    }

    document.getElementById("container").innerHTML = html;

    $(document).on("click",".btn", function () {
        $(this).next(".details").slideToggle();
    });
    $("#search").keyup(function(){
        let val = $(this).val().toLowerCase();
        $(".card-item").each(function(){
            let name = $(this).find("h4").text().toLowerCase();
            if(name.includes(val)){
                $(this).show();
            } else {
                $(this).hide();
            }
        });
    });
</script>
</body>
</html>
